version = 1
SPDX-PackageName = "verilambda"
SPDX-PackageSupplier = "Mika Tammi <mikatammi@gmail.com>"
SPDX-PackageDownloadLocation = "https://github.com/purefunsolutions/verilambda"

# flake.lock is regenerated by `nix flake update` and should not carry an
# inline SPDX comment; cover it here so REUSE lint still sees it.
[[annotations]]
path = "flake.lock"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Mika Tammi"
SPDX-License-Identifier = "MIT OR BSD-3-Clause"

# JSON has no comment syntax; test fixtures and Clash-emitted manifest
# files are annotated here.
[[annotations]]
path = "test/fixtures/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Mika Tammi"
SPDX-License-Identifier = "MIT OR BSD-3-Clause"

[[annotations]]
path = "examples/blinky/clash-manifest.json"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Mika Tammi"
SPDX-License-Identifier = "MIT OR BSD-3-Clause"

# Clash-emitted Verilog committed for the blinky example.
[[annotations]]
path = "examples/blinky/verilog/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Mika Tammi"
SPDX-License-Identifier = "MIT OR BSD-3-Clause"
