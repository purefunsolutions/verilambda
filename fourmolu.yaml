# fourmolu settings. 2-space indent + leading commas + diff-friendly
# imports — see PLAN.md "Formatters & linters" section.

indentation: 2
comma-style: leading
import-export-style: diff-friendly
respectful: true
haddock-style: multi-line
newlines-between-decls: 1
function-arrows: trailing
record-brace-space: true
indent-wheres: false

# fourmolu won't parse CPP-tagged files otherwise; Verilambda.Setup uses
# #if MIN_VERSION_Cabal(3,14,0) to cope with Cabal 3.14's path-type change.
language-extensions:
  - CPP
